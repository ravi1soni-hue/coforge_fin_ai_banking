<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socket Test UI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f7fb;
      color: #1c2430;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #475569;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: #0f62fe;
      color: white;
    }
    button.secondary {
      background: #334155;
    }
    button.warn {
      background: #dc2626;
    }
    .status {
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 6px;
      display: inline-block;
      background: #e2e8f0;
      color: #0f172a;
      margin-bottom: 10px;
    }
    .log {
      background: #0b1220;
      color: #dbe8ff;
      border-radius: 8px;
      padding: 10px;
      min-height: 220px;
      max-height: 360px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .hint {
      margin: 0;
      color: #475569;
      font-size: 13px;
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>AI Orchestration Socket Test</h1>
      <p class="hint">Use this page to test socket request/response flow against the current server.</p>
      <div class="status" id="status">Disconnected</div>
      <div class="grid" style="margin-bottom:10px;">
        <div>
          <label for="autoUrl">Build URL Automatically</label>
          <input id="autoUrl" type="checkbox" checked />
        </div>
        <div>
          <label for="path">WebSocket Path</label>
          <input id="path" value="/ws" />
        </div>
      </div>
      <div class="grid">
        <div>
          <label for="wsUrl">WebSocket URL</label>
          <input id="wsUrl" />
        </div>
        <div>
          <label for="userId">User ID</label>
          <input id="userId" />
        </div>
        <div>
          <label for="sessionId">Session ID</label>
          <input id="sessionId" />
        </div>
        <div>
          <label for="requestId">Request ID (optional)</label>
          <input id="requestId" placeholder="auto-generated if empty" />
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="connectBtn">Connect</button>
        <button class="secondary" id="disconnectBtn">Disconnect</button>
        <button class="secondary" id="diagnoseBtn">Run Connectivity Check</button>
      </div>
    </div>

    <div class="card">
      <div>
        <label for="message">Message</label>
        <textarea id="message">Can I afford a holiday in Japan next month?</textarea>
      </div>
      <div>
        <label for="knownFacts">Known Facts JSON (optional)</label>
        <textarea id="knownFacts">{
  "targetMonth": "next month",
  "destination": "Japan"
}</textarea>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="sendStructuredBtn">Send Structured CHAT_QUERY</button>
        <button class="secondary" id="sendPlainBtn">Send Plain Text</button>
        <button class="warn" id="clearLogBtn">Clear Log</button>
      </div>
    </div>

    <div class="card">
      <label>Socket Log</label>
      <div id="log" class="log"></div>
      <div class="row" style="margin-top:10px;">
        <button class="secondary" id="copyLogBtn">Copy Logs</button>
      </div>
    </div>

    <div class="card">
      <label>Detailed Diagnostics</label>
      <div id="diag" class="log"></div>
    </div>
  </div>

  <script src="/socket-test.js"></script>
</body>
</html>
