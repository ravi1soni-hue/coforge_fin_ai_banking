name: coforge_chat_app
description: "Flutter app for Coforge AI Chat using WebSocket"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # WebSocket support
  web_socket_channel: ^2.4.0

  # State management
  provider: ^6.1.0

  # UUID generation
  uuid: ^4.0.0

  # Date/time formatting
  intl: ^0.19.0

  # UI enhancements
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Fonts (optional)
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
