<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSocket Test Client</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
      padding: 30px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #666;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      animation: pulse 2s infinite;
    }

    .status-dot.connected {
      background: #22c55e;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }

    button:hover:not(:disabled) {
      background: #5568d3;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .user-id {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      margin-bottom: 20px;
      color: #666;
      word-break: break-all;
    }

    .messages {
      height: 300px;
      overflow-y: auto;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      background: #fafafa;
    }

    .message {
      margin-bottom: 12px;
      padding: 10px;
      background: white;
      border-radius: 6px;
      font-size: 13px;
      border-left: 4px solid #667eea;
    }

    .message.sent {
      border-left-color: #22c55e;
      background: #f0fdf4;
    }

    .message.received {
      border-left-color: #3b82f6;
      background: #eff6ff;
    }

    .message.error {
      border-left-color: #ef4444;
      background: #fef2f2;
      color: #dc2626;
    }

    .message-time {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .buttons button {
      font-size: 13px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 WebSocket Test Client</h1>

    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>

    <div class="user-id">
      User ID: <strong id="userId">Generating...</strong>
    </div>

    <div class="input-group">
      <input
        type="text"
        id="messageInput"
        placeholder="Enter message..."
        disabled
      />
      <button id="sendBtn" disabled>Send</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="buttons">
      <button id="connectBtn">Connect</button>
      <button id="clearBtn">Clear</button>
      <button id="disconnectBtn" disabled>Disconnect</button>
    </div>
  </div>

  <script>
    const DEPLOYED_URL = "wss://coforge-fin-ai-banking.railway.app";
    // For local testing, use: "ws://localhost:3000"

    let ws = null;
    const userId = `mobile-${Date.now()}`;
    const messagesDiv = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const connectBtn = document.getElementById("connectBtn");
    const disconnectBtn = document.getElementById("disconnectBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const userIdSpan = document.getElementById("userId");

    userIdSpan.textContent = userId;

    function addMessage(text, type = "info") {
      const time = new Date().toLocaleTimeString();
      const msgEl = document.createElement("div");
      msgEl.className = `message ${type}`;
      msgEl.innerHTML = `
        <div>${text}</div>
        <div class="message-time">${time}</div>
      `;
      messagesDiv.appendChild(msgEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function setConnected(isConnected) {
      if (isConnected) {
        statusDot.classList.add("connected");
        statusText.textContent = "Connected";
        messageInput.disabled = false;
        sendBtn.disabled = false;
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
      } else {
        statusDot.classList.remove("connected");
        statusText.textContent = "Disconnected";
        messageInput.disabled = true;
        sendBtn.disabled = true;
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
      }
    }

    function connect() {
      const wsUrl = `${DEPLOYED_URL}?userId=${userId}`;
      addMessage(`📡 Connecting to: ${wsUrl}`, "info");

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        addMessage("✅ Connected successfully!", "received");
        setConnected(true);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        addMessage(`📨 ${JSON.stringify(data)}`, "received");
      };

      ws.onerror = (error) => {
        addMessage(`❌ Error: ${error}`, "error");
      };

      ws.onclose = () => {
        addMessage("❌ Disconnected", "error");
        setConnected(false);
      };
    }

    function disconnect() {
      if (ws) {
        ws.close();
      }
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      const msg = {
        type: "CHAT_MESSAGE",
        payload: {
          text: text,
          timestamp: Date.now(),
        },
      };

      addMessage(`📤 ${text}`, "sent");
      ws.send(JSON.stringify(msg));
      messageInput.value = "";
    }

    connectBtn.addEventListener("click", connect);
    disconnectBtn.addEventListener("click", disconnect);
    sendBtn.addEventListener("click", sendMessage);
    clearBtn.addEventListener("click", () => {
      messagesDiv.innerHTML = "";
    });

    messageInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    setConnected(false);
  </script>
</body>
</html>
